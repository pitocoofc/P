<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Virtual - Corrigido</title>
    
    <!-- Importação Oficial do Puter.js (Sem chaves e sem backend) -->
    <script src="https://puter.com"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 80vh;
        }

        .chat-header {
            background-color: #25d366;
            color: #ffffff;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #efeae2;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            background-color: #d9fdd3;
            color: #111b21;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            background-color: #ffffff;
            color: #111b21;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #f0f2f5;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            outline: none;
            font-size: 0.95em;
        }

        .chat-input-area button {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 0 18px;
            margin-left: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input-area button:disabled {
            background-color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Suporte Técnico - TechZone</div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Olá! Sou o assistente da TechZone. Como posso ajudar hoje?</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escreva a sua mensagem..." autocomplete="off">
            <button id="sendBtn" onclick="processarEnvio()">Enviar</button>
        </div>
    </div>

    <script>
        // 1. INSTRUÇÕES DO SEU NEGÓCIO (A IA vai ler isto antes de cada resposta)
        const contextoDoNegocio = `
Contexto do Sistema:
És o assistente oficial da loja "TechZone" em Lisboa.
Segues estritamente estas informações para responder:
- Mudança de ecrã: 80€ (demora 1 hora).
- Mudança de bateria: 40€ (demora 30 minutos).
- Garantia: 6 meses.
Regra: Responde sempre em português de Portugal, de forma simpática, muito curta e direta.

Pergunta do cliente: `;

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') processarEnvio();
        });

        function processarEnvio() {
            const textoUsuario = userInput.value.trim();
            if (!textoUsuario) return;

            desativarInterface(true);
            adicionarMensagemNoEcra(textoUsuario, 'user');
            userInput.value = '';

            const idMensagemPensando = adicionarMensagemNoEcra('A digitar...', 'bot');

            // 2. CORREÇÃO CRUCIAL: Unir o contexto e o texto numa única string limpa
            const promptFinal do Prompt = contextoDoNegocio + '"' + textoUsuario + '"';

            // 3. CHAMADA DIRETA DA API PÚBLICA (Aceita a string sem falhar)
            puter.ai.chat(promptFinal do Prompt)
                .then(response => {
                    document.getElementById(idMensagemPensando).remove();
                    
                    // O Puter devolve o texto diretamente ou dentro de response.message
                    const respostaTexto = response.message ? response.message.content : response;
                    
                    adicionarMensagemNoEcra(respostaTexto, 'bot');
                })
                .catch(error => {
                    console.error("Erro na API do Puter:", error);
                    document.getElementById(idMensagemPensando).remove();
                    adicionarMensagemNoEcra("Lamento, ocorreu um erro ao processar. Tente novamente.", 'bot');
                })
                .finally(() => {
                    desativarInterface(false);
                });
        }

        function adicionarMensagemNoEcra(texto, remetente) {
            const idUnico = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.className = `message ${remetente}`;
            div.id = idUnico;
            div.innerText = texto;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return idUnico;
        }

        function desativarInterface(bloquear) {
            userInput.disabled = bloquear;
            sendBtn.disabled = bloquear;
            if (!bloquear) userInput.focus();
        }
    </script>
</body>
</html>
