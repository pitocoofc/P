<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Virtual - Puter.js</title>
    
    <!-- Importação do Puter.js (Oficial, Gratuito e Sem Chave) -->
    <script src="https://puter.com"></script>

    <style>
        /* Estilos básicos para uma interface moderna e limpa */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 80vh;
        }

        .chat-header {
            background-color: #007bff;
            color: #ffffff;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.4;
        }

        .message.user {
            background-color: #007bff;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            background-color: #e9ecef;
            color: #333333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #ffffff;
            border-top: 1px solid #eeeeee;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            outline: none;
            font-size: 0.95em;
        }

        .chat-input-area button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0 18px;
            margin-left: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #0056b3;
        }

        .chat-input-area button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Suporte - TechZone</div>
        
        <!-- Zona onde as mensagens vão aparecer -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Olá! Sou o assistente da TechZone. Como posso ajudar hoje?</div>
        </div>

        <!-- Zona de digitação -->
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escreva a sua mensagem..." autocomplete="off">
            <button id="sendBtn" onclick="processarEnvio()">Enviar</button>
        </div>
    </div>

    <script>
        // 1. O CONTEXTO PRÉVIO: Altere este texto com os dados do seu projeto
        const contextoDoNegocio = `
            Tu és o assistente virtual da loja "TechZone", especializada em reparações de telemóveis.
            Informações cruciais que deves saber e seguir estritamente:
            - Localização: Avenida da Liberdade, nº 10, Lisboa.
            - Preço da mudança de ecrã: 80€ (demora cerca de 1 hora).
            - Preço da mudança de bateria: 40€ (demora cerca de 30 minutos).
            - Garantia: Oferecemos 6 meses de garantia em todas as reparações.
            Responde sempre em português de Portugal, de forma muito breve, profissional e direta.
        `;

        // Elementos da interface
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Escutar a tecla "Enter" no teclado para facilitar o envio
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') processarEnvio();
        });

        // 2. FUNÇÃO PRINCIPAL: Gere o fluxo de envio e receção
        function processarEnvio() {
            const textoUsuario = userInput.value.trim();
            if (!textoUsuario) return; // Ignora se estiver vazio

            // Bloqueia a interface enquanto a IA processa para evitar cliques duplos
            desativarInterface(true);

            // Adiciona a mensagem do utilizador no ecrã
            adicionarMensagemNoEcra(textoUsuario, 'user');
            userInput.value = ''; // Limpa o campo de texto

            // Adiciona uma mensagem temporária de "A pensar..."
            const idMensagemPensando = adicionarMensagemNoEcra('A digitar...', 'bot');

            // 3. ESTRUTURAÇÃO DAS MENSAGENS: Injeta o contexto antes da pergunta
            const mensagensParaAPI = [
                { role: "system", content: contextoDoNegocio },
                { role: "user", content: textoUsuario }
            ];

            // 4. CHAMADA À API PÚBLICA DO PUTER.JS
            puter.ai.chat(mensagensParaAPI)
                .then(response => {
                    // Remove o texto "A digitar..."
                    document.getElementById(idMensagemPensando).remove();
                    
                    // Extrai a resposta textual devolvida pela IA
                    const respostaDaIA = response.message.content;
                    
                    // Exibe a resposta final do robô no ecrã
                    adicionarMensagemNoEcra(respostaDaIA, 'bot');
                })
                .catch(error => {
                    console.error("Erro Puter API:", error);
                    document.getElementById(idMensagemPensando).remove();
                    adicionarMensagemNoEcra("Desculpe, ocorreu um erro na ligação. Tente novamente.", 'bot');
                })
                .finally(() => {
                    // Reativa o botão e o campo de texto
                    desativarInterface(false);
                });
        }

        // Funções auxiliares de interface
        function adicionarMensagemNoEcra(texto, remetente) {
            const idUnico = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.className = `message ${remetente}`;
            div.id = idUnico;
            div.innerText = texto;
            chatMessages.appendChild(div);
            
            // Faz o scroll automático para a última mensagem
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return idUnico;
        }

        function desativarInterface(bloquear) {
            userInput.disabled = bloquear;
            sendBtn.disabled = bloquear;
            if (!bloquear) userInput.focus();
        }
    </script>
</body>
</html>
